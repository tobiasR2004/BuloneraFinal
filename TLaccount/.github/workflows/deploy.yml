name: CI/CD TLaccount

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar con Maven (Generar .war)
        run: mvn clean package -DskipTests

      # --- INICIO DE SECCIÓN COMENTADA (VPS) ---
      # Descomenta estas líneas cuando ya tengas tu servidor configurado
      # y los Secrets cargados en GitHub.

      # - name: Desplegar al VPS vía SCP
      #   uses: appleboy/scp-action@master
      #   with:
      #     host: ${{ secrets.VPS_HOST }}
      #     username: ${{ secrets.VPS_USER }}
      #     key: ${{ secrets.VPS_SSH_KEY }}
      #     source: "target/*.war"
      #     target: "/opt/tomcat/webapps/"
      #     strip_components: 1
      # --- FIN DE SECCIÓN COMENTADA ---

      - name: Subir Artefacto (Para probar que el .war se creó bien)
        uses: actions/upload-artifact@v4
        with:
          name: war-generado
          path: target/*.war